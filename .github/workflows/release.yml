# Release pipeline. Trigger: push a per-tool tag like `imap-extract-v0.1.0`.
#
# Compiled tools (lang rust/bun) build on a NATIVE macOS arm64 runner (so Apple's
# ld64 ad-hoc signs the binary — no hand-rolled signer, runs on Sequoia) and ship
# a per-arch tarball. Script tools (lang bash/python) are tarred as-is into a
# noarch tarball — no build, no signing. Either way: smoke-test it ACTUALLY runs,
# publish a GitHub Release with the tarball + sha256, regenerate Formula/<tool>.rb
# via forge, and commit it back to main.
#
# v1 is arm64-only and intentionally does NOT use cargo-dist: on a native runner
# signing is free and forge owns the formula, so dist adds nothing yet. Adopt dist
# when adding the x64/linux matrix + build-provenance attestation.
name: release

on:
  push:
    tags: ["*-v[0-9]*"]

permissions:
  contents: write

# Serialize formula commits so two tools released at once can't drop an update.
concurrency:
  group: release-formula-commit
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse tag → tool + version, detect kind
        id: tag
        run: |
          tag="${GITHUB_REF_NAME}"
          tool="${tag%-v*}"
          echo "tool=$tool" >> "$GITHUB_OUTPUT"
          echo "version=${tag##*-v}" >> "$GITHUB_OUTPUT"
          if [ -f "tools/$tool/tool.json" ]; then
            root="tools"
          elif [ -f "scripts/$tool/tool.json" ]; then
            root="scripts"
          else
            echo "::error::no tool.json for '$tool' under tools/ or scripts/"; exit 1
          fi
          lang="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["lang"])' "$root/$tool/tool.json")"
          case "$lang" in
            bash|python) kind=script ;;
            rust|bun)    kind=compiled ;;
            *) echo "::error::unknown lang '$lang' for '$tool'"; exit 1 ;;
          esac
          echo "root=$root" >> "$GITHUB_OUTPUT"
          echo "lang=$lang" >> "$GITHUB_OUTPUT"
          echo "kind=$kind" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        if: steps.tag.outputs.kind == 'compiled'
        run: cargo build --release -p "${{ steps.tag.outputs.tool }}"

      - name: Package (+ verify signature for compiled)
        id: pkg
        run: |
          tool="${{ steps.tag.outputs.tool }}"
          if [ "${{ steps.tag.outputs.kind }}" = "compiled" ]; then
            asset="${tool}-aarch64-apple-darwin.tar.gz"
            bin="target/release/${tool}"
            # Guard against a future toolchain signing regression: verify, else
            # strip + ad-hoc re-sign.
            codesign --verify --verbose=2 "$bin" || {
              codesign --remove-signature "$bin" || true
              codesign --force --sign - "$bin"
            }
            tar -czf "$asset" -C target/release "$tool"
          else
            # Interpreted script: ship the file as-is — no build, no signing.
            asset="${tool}-noarch.tar.gz"
            tar -czf "$asset" -C "${{ steps.tag.outputs.root }}/${tool}" "$tool"
          fi
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$asset" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Smoke test — it must actually RUN (not just exist)
        run: |
          tool="${{ steps.tag.outputs.tool }}"
          if [ "${{ steps.tag.outputs.kind }}" = "compiled" ]; then
            bin="target/release/${tool}"
            "$bin" selftest || "$bin" --help
          else
            "${{ steps.tag.outputs.root }}/${tool}/${tool}" --help
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.asset }}
          fail_on_unmatched_files: true

      - name: Regenerate formula
        run: |
          cargo run --release -p forge -- formula "${{ steps.tag.outputs.tool }}" \
            --version "${{ steps.tag.outputs.version }}" \
            --url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pkg.outputs.asset }}" \
            --sha256 "${{ steps.pkg.outputs.sha256 }}"

      - name: Commit formula to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add Formula/
          if git diff --cached --quiet; then
            echo "Formula unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "formula: ${{ steps.tag.outputs.tool }} ${{ steps.tag.outputs.version }}"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            sleep $((RANDOM % 5 + 3))
          done
          echo "::error::failed to push formula commit after retries"
          exit 1
